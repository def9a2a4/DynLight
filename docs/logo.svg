<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="flame" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#FF6B00"/>
      <stop offset="50%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <linearGradient id="stick" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#5C4400"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="45%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowBlur">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
    <filter id="flameBlur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Ambient glow -->
  <circle cx="128" cy="110" r="90" fill="url(#glow)" filter="url(#glowBlur)"/>

  <!-- Light rays -->
  <g stroke="#FFD700" stroke-opacity="0.7" stroke-width="2.5" stroke-linecap="round">
    <line x1="128" y1="38" x2="128" y2="14"/>
    <line x1="158" y1="48" x2="175" y2="28"/>
    <line x1="178" y1="78" x2="204" y2="72"/>
    <line x1="168" y1="108" x2="192" y2="120"/>
    <line x1="88" y1="108" x2="64" y2="120"/>
    <line x1="78" y1="78" x2="52" y2="72"/>
    <line x1="98" y1="48" x2="81" y2="28"/>
  </g>

  <!-- Ray tip dots -->
  <g fill="#FFD700" opacity="0.8">
    <circle cx="128" cy="12" r="3"/>
    <circle cx="177" cy="26" r="3"/>
    <circle cx="206" cy="71" r="3"/>
    <circle cx="194" cy="121" r="3"/>
    <circle cx="62" cy="121" r="3"/>
    <circle cx="50" cy="71" r="3"/>
    <circle cx="79" cy="26" r="3"/>
  </g>

  <!-- Torch stick -->
  <rect x="118" y="120" width="20" height="90" rx="3" fill="url(#stick)" stroke="#3D2B00" stroke-width="1.5"/>

  <!-- Stick wrap bands -->
  <rect x="116" y="126" width="24" height="5" rx="2" fill="#A07828" stroke="#5C4400" stroke-width="0.8"/>
  <rect x="116" y="140" width="24" height="5" rx="2" fill="#A07828" stroke="#5C4400" stroke-width="0.8"/>

  <!-- Torch head / coal cup -->
  <path d="M110,122 L112,108 L144,108 L146,122 Z" fill="#4A3520" stroke="#2E1F0E" stroke-width="1.5"/>

  <!-- Flame (outer) -->
  <path d="M128,46 C136,62 148,78 148,94 C148,105 139,112 128,112 C117,112 108,105 108,94 C108,78 120,62 128,46Z"
        fill="url(#flame)" filter="url(#flameBlur)"/>

  <!-- Flame (inner bright core) -->
  <path d="M128,62 C133,72 140,82 140,92 C140,100 135,106 128,106 C121,106 116,100 116,92 C116,82 123,72 128,62Z"
        fill="#FFEF99" opacity="0.7"/>

  <!-- Bottom cap -->
  <rect x="120" y="206" width="16" height="6" rx="2" fill="#3D2B00"/>
</svg>
