# DynLight configuration

# Update interval in ticks (20 ticks = 1 second)
# smaller values = more frequent updates = smoother light movement but higher CPU usage
update-interval: 1

# Maximum distance to render dynamic lights (blocks)
render-distance: 96

# How often to check for fire expiration on entities (ticks, 10 = 0.5 seconds)
fire-sweep-interval: 10

# Detection toggles
detection:
  held-items: true
  dropped-items: true
  burning-entities: true
  flaming-arrows: true
  enchanted-armor: true
  enchanted-items: true
  always-lit-entities: true

# Light levels for player equipment
light-levels:
  enchanted-armor: 3
  enchanted-items: 3

# Item light levels
# Simple format (ITEM: level) = works underwater
# Extended format (ITEM: {light: level, water-sensitive: true}) = extinguished underwater
items:
  # Water-sensitive items (fire-based, extinguished underwater)
  TORCH:
    light: 10
    water-sensitive: true
  SOUL_TORCH:
    light: 8
    water-sensitive: true
  REDSTONE_TORCH:
    light: 6
    water-sensitive: true
  LANTERN:
    light: 12
    water-sensitive: false
  SOUL_LANTERN:
    light: 9
    water-sensitive: false
  CAMPFIRE:
    light: 6
    water-sensitive: true
  SOUL_CAMPFIRE:
    light: 4
    water-sensitive: true
  LAVA_BUCKET:
    light: 12
    water-sensitive: true
  FIRE_CHARGE:
    light: 7
    water-sensitive: true
  BLAZE_ROD:
    light: 10
    water-sensitive: false
  BLAZE_POWDER:
    light: 6
    water-sensitive: false
  # Copper torches & lanterns (1.21.5+, ignored on older versions)
